<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: warm off-white (paper) with rounded corners -->
  <rect width="512" height="512" rx="112" fill="#f7f7f6"/>

  <!-- Subtle inner shadow at edges -->
  <rect x="6" y="6" width="500" height="500" rx="108" fill="none" stroke="#bfb8a6" stroke-width="2" opacity="0.4"/>

  <!-- Brass accent bar (top-left) -->
  <rect x="64" y="64" width="20" height="384" rx="4" fill="#95771c"/>

  <!-- Three keycaps arranged in a stylized "K" / cascade pattern -->
  <!-- Keycap 1 (top-left, accent brass) -->
  <g transform="translate(120, 96)">
    <!-- right wall -->
    <polygon points="128,16 144,32 144,144 128,128" fill="#7a5e16"/>
    <!-- bottom wall -->
    <polygon points="16,128 128,128 144,144 32,144" fill="#5c4710"/>
    <!-- top face -->
    <rect x="16" y="16" width="112" height="112" rx="10" fill="#95771c" stroke="#5c4710" stroke-width="1.5"/>
    <!-- legend "K" -->
    <text x="72" y="92" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="900" fill="#f7f7f6" text-anchor="middle">K</text>
  </g>

  <!-- Keycap 2 (middle-right, ink dark) -->
  <g transform="translate(256, 200)">
    <polygon points="128,16 144,32 144,144 128,128" fill="#0d0d10"/>
    <polygon points="16,128 128,128 144,144 32,144" fill="#000000"/>
    <rect x="16" y="16" width="112" height="112" rx="10" fill="#20201d" stroke="#000000" stroke-width="1.5"/>
    <text x="72" y="92" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="700" fill="#95771c" text-anchor="middle">L</text>
  </g>

  <!-- Keycap 3 (bottom-left, cream surface) -->
  <g transform="translate(120, 304)">
    <polygon points="128,16 144,32 144,144 128,128" fill="#b8b5a8"/>
    <polygon points="16,128 128,128 144,144 32,144" fill="#9c998c"/>
    <rect x="16" y="16" width="112" height="112" rx="10" fill="#e9e8e4" stroke="#9c998c" stroke-width="1.5"/>
    <text x="72" y="92" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="700" fill="#5b533e" text-anchor="middle">B</text>
  </g>
</svg>
